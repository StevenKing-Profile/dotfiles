# ==========================================
# TMUX WIZARD CONFIGURATION
# ==========================================

# 1. Ergonomic Prefix: Change from Ctrl+b to Ctrl+a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# 2. Intuitive Window Splitting
# Use | for vertical splits and - for horizontal splits
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# 3. Enable Mouse Support
# Allows you to click to switch panes, drag to resize, and scroll naturally
set -g mouse on

# 4. Human Indexing
# Start windows and panes at 1 instead of 0 (since 0 is on the far right of the keyboard)
set -g base-index 1
setw -g pane-base-index 1

# 5. True Color Support Fix
# CRITICAL: Without this, your Starship prompt and syntax highlighting will look broken inside tmux
set-option -ga terminal-overrides ",xterm-256color:Tc"
set -g default-terminal "screen-256color"

# 6. Fast Config Reload
# Prefix + r reloads the config instantly
bind r source-file ~/.tmux.conf \; display-message "Config reloaded."

### MISC
# Enable OSC 52 clipboard
set -s set-clipboard on

# Allow applications to send escape sequences to the terminal
set -as terminal-features ',xterm-256color:clipboard'

# If using tmux 3.3+, enable passthrough for older escape sequences
set -g allow-passthrough on
